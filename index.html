<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fairdrop</title>
    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        if (theme === "light") document.documentElement.classList.remove("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Inline loader shown until React mounts and replaces #root contents -->
      <style>
        html, body, #root {
          margin: 0;
          padding: 0;
          height: 100%;
        }
        body { background: #0F172A; }
        html:not(.dark) body { background: #F8FAFC; }

        #app-loader {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
        }
        #app-loader .dot {
          width: 0.5rem;
          height: 0.5rem;
          margin: 0 0.3rem;
          border-radius: 50%;
          background: #38BDF8;
          animation: bounce 1.4s ease-in-out infinite;
        }
        html:not(.dark) #app-loader .dot { background: #0EA5E9; }
        #app-loader .dot:nth-child(2) { animation-delay: 0.16s; }
        #app-loader .dot:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
          0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
          40% { transform: scale(1); opacity: 1; }
        }
      </style>
      <div id="app-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
